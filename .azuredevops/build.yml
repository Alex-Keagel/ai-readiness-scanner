# Azure DevOps Build Pipeline for AI Readiness Scanner
# Triggers on main branch pushes and PRs

trigger:
  branches:
    include:
      - main
  paths:
    exclude:
      - '*.md'
      - 'docs/**'

pr:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  nodeVersion: '20.x'

stages:
  - stage: Build
    displayName: 'Build & Test'
    jobs:
      - job: BuildAndTest
        displayName: 'Build, Lint, Test'
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '$(nodeVersion)'
            displayName: 'Install Node.js'

          - script: npm ci
            displayName: 'Install dependencies'

          - script: npm run build
            displayName: 'Build extension'

          - script: npm test
            displayName: 'Run tests'

          - script: npx vsce package --no-dependencies
            displayName: 'Package VSIX'

          - task: CopyFiles@2
            inputs:
              contents: '*.vsix'
              targetFolder: '$(Build.ArtifactStagingDirectory)'
            displayName: 'Copy VSIX to staging'

          - task: PublishBuildArtifacts@1
            inputs:
              pathToPublish: '$(Build.ArtifactStagingDirectory)'
              artifactName: 'vsix'
            displayName: 'Publish VSIX artifact'

  - stage: Release
    displayName: 'Release'
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: PublishExtension
        displayName: 'Publish to Marketplace'
        steps:
          - task: DownloadBuildArtifacts@1
            inputs:
              buildType: 'current'
              downloadType: 'single'
              artifactName: 'vsix'
              downloadPath: '$(System.ArtifactsDirectory)'

          # Uncomment when ready to publish:
          # - script: npx vsce publish --packagePath $(System.ArtifactsDirectory)/vsix/*.vsix
          #   displayName: 'Publish to VS Code Marketplace'
          #   env:
          #     VSCE_PAT: $(vsceToken)

          - script: echo "VSIX built successfully. Ready for manual publish or marketplace release."
            displayName: 'Release summary'
